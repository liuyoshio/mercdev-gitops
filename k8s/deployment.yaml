apiVersion: apps/v1
kind: Deployment
metadata:
  name: platformd
  labels: { app: platformd }
spec:
  replicas: 2
  selector:
    matchLabels: { app: platformd }
  template:
    metadata:
      labels: { app: platformd }
    spec:
      containers:
        - name: platformd
          image: platformd:dev
          imagePullPolicy: IfNotPresent   # use the locally-loaded image
          args: ["serve"]
          ports:
            - { name: grpc, containerPort: 50051 }
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /v1/services, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /v1/services, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 128Mi }