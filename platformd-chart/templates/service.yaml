apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - { name: http, port: {{ .Values.service.httpPort }}, targetPort: {{ .Values.service.httpPort }} }
    - { name: grpc, port: {{ .Values.service.grpcPort }}, targetPort: {{ .Values.service.grpcPort }} }